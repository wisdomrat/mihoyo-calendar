name: Sync Character Data

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch character data
        run: npm run fetch-characters

      - name: Build site
        run: npm run build

      - name: Check for data changes
        id: git-check
        run: |
          if ! git diff --exit-code -- public/data/characters.json src/data/characters.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push data changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/characters.json src/data/characters.json
          git commit -m "Update character data [$(date +'%Y-%m-%d')]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
